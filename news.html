<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Animation -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

<style>

/* BACKGROUND */

body{
margin:0;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);;
background-size:300% 300%;
animation:bgShift 15s ease infinite;
color:white;
font-family:"Poppins",sans-serif;
overflow-x:hidden;
}

@keyframes bgShift{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.05)!important;
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar::after{
content:"";
display:block;
height:2px;
background:linear-gradient(90deg,#6a00ff,#00eaff);
}

.nav-link{
color:#ddd !important;
transition:.3s;
}

.nav-link:hover{
color:#00eaff !important;
}

.nav-link.active{
color:#00eaff !important;
}

/* LOGO */

.brand-logo{
width:40px;
height:40px;
margin-right:10px;
border-radius:50%;
box-shadow:0 0 18px rgba(140,0,255,0.7);
animation:logoGlow 3s infinite ease-in-out;
}

@keyframes logoGlow{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* TITLE */

.page-title{
text-align:center;
margin-top:80px;
font-size:42px;
font-weight:700;
text-shadow:0 0 25px #aa63ff;
}

/* FILTER BUTTONS */

.filter-btn{
border:none;
padding:10px 22px;
border-radius:40px;
margin:6px;
background:rgba(255,255,255,0.08);
color:white;
border:1px solid rgba(255,255,255,0.18);
transition:.25s;
cursor:pointer;
}

.filter-btn:hover{
background:#6a00ff;
transform:translateY(-3px);
box-shadow:0 0 18px #6a00ff;
}

/* FEATURED NEWS */

.featured-box{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
padding:30px;
backdrop-filter:blur(16px);
margin-bottom:40px;
}

/* NEWS CARD */

.news-card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border-radius:18px;
padding:20px;
height:100%;
border:1px solid rgba(255,255,255,0.12);
transition:.35s;
}

.news-card:hover{
transform:translateY(-6px);
box-shadow:0 0 14px rgba(0,238,255,0.3);
}

.news-card h5{
font-size:18px;
}

.news-card p{
font-size:14px;
opacity:0.9;
}

.news-card a{
text-decoration:none;
color:#00eaff;
}

/* SKELETON */

.skeleton{
background:linear-gradient(90deg,#2f2f2f,#4b4b4b,#2f2f2f);
background-size:200% 100%;
animation:loading 1.2s infinite;
border-radius:10px;
}

@keyframes loading{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}

.skeleton-box{
height:120px;
}

.skeleton-title{
height:18px;
width:80%;
margin:10px 0;
}

.skeleton-desc{
height:12px;
margin:6px 0;
}

/* FOOTER */

.footer{
margin-top:80px;
padding:30px;
text-align:center;
background:rgba(255,255,255,0.05);
border-top:1px solid rgba(255,255,255,0.1);
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

.page-title{
font-size:26px;
margin-top:60px;
}

.news-card{
padding:18px;
}

.filter-btn{
font-size:13px;
padding:8px 16px;
}

}

</style>
</head>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">

<!-- TITLE -->

<h2 class="page-title animate__animated animate__fadeInDown">
📰 Live Crypto News & Market Updates
</h2>

<div class="container">

<!-- FILTER -->

<div class="text-center mt-4 mb-4">

<button class="filter-btn" onclick="filterNews('all')">All</button>
<button class="filter-btn" onclick="filterNews('bitcoin')">Bitcoin</button>
<button class="filter-btn" onclick="filterNews('ethereum')">Ethereum</button>

</div>

<!-- FEATURED -->

<div id="featuredNews"></div>

<!-- NEWS GRID -->

<div class="row" id="newsList"></div>

</div>

<script>

/* SKELETON */

function showSkeleton(){

let html="";

for(let i=0;i<6;i++){

html+=`
<div class="col-lg-4 col-md-6 col-12 mb-4">

<div class="news-card">

<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-title"></div>
<div class="skeleton skeleton-desc"></div>

</div>

</div>
`;

}

document.getElementById("newsList").innerHTML=html;

}

showSkeleton();

/* LOAD NEWS */

async function loadNews(){

const res=await fetch("https://cryptopanic.com/api/v1/posts/?public=true");

const data=await res.json();

let news=data.results;

/* FEATURED */

let featured=news[0];

document.getElementById("featuredNews").innerHTML=`

<div class="featured-box">

<h3>${featured.title}</h3>

<p>${featured.description ?? "Latest crypto news update."}</p>

<a href="${featured.url}" target="_blank" class="btn btn-info mt-3">

Read Full Story →

</a>

</div>

`;

/* NEWS GRID */

let html="";

news.slice(1,10).forEach(n=>{

html+=`

<div class="col-lg-4 col-md-6 col-12 mb-4 news-item">

<div class="news-card">

<h5>${n.title}</h5>

<p>${n.description ?? "Crypto market update."}</p>

<a href="${n.url}" target="_blank">

Read More →

</a>

</div>

</div>

`;

});

document.getElementById("newsList").innerHTML=html;

}

loadNews();

/* FILTER */

function filterNews(cat){

document.querySelectorAll(".news-item").forEach(item=>{

if(cat==="all"){

item.style.display="block";

}else{

if(item.innerText.toLowerCase().includes(cat)){

item.style.display="block";

}else{

item.style.display="none";

}

}

});

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
